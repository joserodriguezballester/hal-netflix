<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoNetflix - Miniseries</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: #141414; 
            color: #fff; 
            min-height: 100vh; 
        }
        @media (max-width: 500px) { 
            .header { padding: 10px 15px; gap: 8px; }
            .logo { font-size: 20px; }
            .logo .big { font-size: 26px; }
            .nav-btn { font-size: 12px; padding: 6px 10px; }
            .stats { font-size: 11px; padding: 6px 10px; }
        }
        .header { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            padding: 15px 30px; 
            background: linear-gradient(180deg, rgba(20,20,20,0.98) 0%, rgba(20,20,20,0) 100%); 
            z-index: 1000; 
            display: flex; 
            align-items: center; 
            gap: 20px; 
        }
        .logo { color: #e50914; font-size: 28px; font-weight: bold; letter-spacing: 2px; }
        .logo .big { font-size: 36px; }
        .nav-btn { 
            background: transparent; 
            border: none; 
            color: #fff; 
            font-size: 16px; 
            cursor: pointer; 
            padding: 8px 16px; 
            border-radius: 4px;
            transition: all 0.2s;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.1); }
        .nav-btn.active { border-bottom: 3px solid #e50914; }
        .stats { 
            margin-left: auto; 
            background: rgba(255,255,255,0.1); 
            padding: 8px 16px; 
            border-radius: 4px; 
            font-size: 14px; 
            color: #aaa;
        }
        .stats span { color: #e50914; font-weight: bold; }
        @media (max-width: 500px) { main { padding: 65px 10px 15px 10px; } }
        main { padding: 80px 30px 30px 30px; max-width: 1600px; margin: 0 auto; }
        
        .detail-panel { 
            position: fixed; 
            top: 70px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90%; 
            max-width: 1200px; 
            background: #181818; 
            border-radius: 8px; 
            padding: 30px; 
            display: none; 
            z-index: 100; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.9); 
            max-height: 85vh; 
            overflow-y: auto; 
        }
        .detail-panel.active { 
            display: flex; 
            gap: 30px; 
            animation: fadeIn 0.3s ease; 
        }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); } 
            to { opacity: 1; transform: translateX(-50%) translateY(0); } 
        }
        .detail-poster { 
            width: 280px; 
            height: 420px; 
            object-fit: cover; 
            border-radius: 8px; 
            flex-shrink: 0; 
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%); 
        }
        .detail-info { flex: 1; }
        .detail-title { font-size: 36px; font-weight: bold; margin-bottom: 12px; }
        .detail-meta { color: #999; margin-bottom: 20px; font-size: 15px; }
        .detail-synopsis { line-height: 1.7; margin-bottom: 20px; font-size: 15px; }
        .detail-cast { color: #aaa; font-size: 14px; margin-bottom: 20px; }
        .detail-genres { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; }
        .genre-tag { 
            background: rgba(229,9,14,0.2); 
            border: 1px solid rgba(229,9,14,0.5); 
            padding: 6px 14px; 
            border-radius: 4px; 
            font-size: 13px; 
        }
        .detail-actions { display: flex; gap: 15px; flex-wrap: wrap; }
        .netflix-btn { 
            background: #e50914; 
            color: #fff; 
            border: none; 
            padding: 14px 28px; 
            font-size: 16px; 
            border-radius: 4px; 
            cursor: pointer; 
            transition: all 0.2s; 
            font-weight: bold; 
            text-decoration: none;
            display: inline-block;
        }
        .netflix-btn:hover { background: #f40612; transform: scale(1.02); }
        .mark-viewed-btn {
            background: transparent;
            border: 2px solid #46d369;
            color: #46d369;
            padding: 12px 24px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        .mark-viewed-btn:hover { background: #46d369; color: #141414; }
        .mark-viewed-btn.viewed { border-color: #666; color: #666; }
        .mark-viewed-btn.viewed:hover { background: #333; color: #999; }
        
        .category { margin-bottom: 50px; }
        .category-title { 
            font-size: 26px; 
            margin-bottom: 20px; 
            padding-left: 15px; 
            border-left: 4px solid #e50914; 
        }
        .cards-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 20px; 
        }
        @media (max-width: 1400px) { .cards-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 1100px) { .cards-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 800px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }
        
        @media (max-width: 500px) { 
            .card { margin: 0; }
            .card img { height: 180px; }
            .card-title { font-size: 11px; padding: 8px; }
        }
        .card { 
            cursor: pointer; 
            transition: all 0.3s ease; 
            border-radius: 8px; 
            overflow: hidden; 
            position: relative; 
            background: #181818; 
        }
        .card:hover { transform: scale(1.08); box-shadow: 0 8px 25px rgba(229,9,14,0.5); z-index: 10; }
        .card.selected { box-shadow: 0 0 0 4px #e50914; transform: scale(1.05); }
        .card-poster { 
            width: 100%; 
            aspect-ratio: 2/3; 
            object-fit: cover; 
            display: block; 
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%); 
        }
        .card-info { padding: 15px; background: #181818; }
        .card-title { 
            font-size: 15px; 
            font-weight: bold; 
            margin-bottom: 6px; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
            overflow: hidden; 
            line-height: 1.3; 
        }
        .card-meta { font-size: 13px; color: #888; }
        .card-viewed { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            background: #46d369; 
            color: #141414; 
            padding: 4px 10px; 
            border-radius: 4px; 
            font-size: 11px; 
            font-weight: bold; 
        }
        
        .close-btn { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: rgba(0,0,0,0.7); 
            border: none; 
            color: #fff; 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            cursor: pointer; 
            font-size: 28px; 
            line-height: 1; 
            transition: all 0.2s; 
        }
        .close-btn:hover { background: #e50914; transform: rotate(90deg); }
        .empty-msg { text-align: center; padding: 40px; color: #666; font-size: 18px; }
        .loading { text-align: center; padding: 40px; color: #888; font-size: 18px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"><span class="big">J</span>o<span class="big">N</span>etflix</div>
        <button class="nav-btn active" id="btnPendientes" onclick="showSection('pendientes')">📺 Pendientes</button>
        <button class="nav-btn" id="btnVistas" onclick="showSection('vistas')">✅ Vistas</button>
        <button class="nav-btn" id="btnTodas" onclick="showSection('todas')">📋 Todas</button>
        <div class="stats" id="stats"></div>
    </header>

    <main>
        <div class="detail-panel" id="detailPanel">
            <button class="close-btn" onclick="closeDetail()">×</button>
            <img class="detail-poster" id="detailPoster" src="" alt="">
            <div class="detail-info">
                <h1 class="detail-title" id="detailTitle"></h1>
                <div class="detail-meta" id="detailMeta"></div>
                <p class="detail-synopsis" id="detailSynopsis"></p>
                <div class="detail-cast" id="detailCast"></div>
                <div class="detail-genres" id="detailGenres"></div>
                <div class="detail-actions">
                    <a class="netflix-btn" id="netflixBtn" href="#" target="_blank">▶ Ver en Netflix</a>
                    <button class="mark-viewed-btn" id="markViewedBtn" onclick="toggleViewed()">✓ Marcar como vista</button>
                </div>
            </div>
        </div>
        <div id="content"><div class="loading">Cargando catálogo...</div></div>
    </main>

    <!-- Datos en archivo JS externo (funciona en file://) -->
    <script src="data.js"></script>
    <script>
        let allSeries = [];
        let currentSection = 'pendientes';
        let selectedSeries = null;
        let viewedSeries = JSON.parse(localStorage.getItem('viewedSeries') || '[]');

        function loadSeries() {
            if (typeof SERIES_DATA !== 'undefined') {
                allSeries = SERIES_DATA.series;
                console.log('Miniseries cargadas:', SERIES_DATA.lastUpdate, '- Total:', allSeries.length);
            } else {
                console.log('Error: SERIES_DATA no disponible');
                document.getElementById('content').innerHTML = '<div class="empty-msg">Error al cargar el catálogo</div>';
                return;
            }
            
            // Sincronizar vistas del JSON con localStorage
            allSeries.forEach(s => {
                if (s.viewed && !viewedSeries.includes(s.id)) {
                    viewedSeries.push(s.id);
                }
            });
            localStorage.setItem('viewedSeries', JSON.stringify(viewedSeries));
            
            updateStats();
            renderContent();
        }

        function updateStats() {
            const notViewed = allSeries.filter(s => !viewedSeries.includes(s.id) && !s.genres?.includes('Skipped')).length;
            const viewed = allSeries.filter(s => viewedSeries.includes(s.id)).length;
            document.getElementById('stats').innerHTML = 
                `📊 <span>${notViewed}</span> pendientes · <span>${viewed}</span> vistas`;
        }

        function showSection(section) {
            currentSection = section;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn' + section.charAt(0).toUpperCase() + section.slice(1)).classList.add('active');
            closeDetail();
            renderContent();
        }

        function renderContent() {
            let seriesToShow = [];
            let title = '';
            
            if (currentSection === 'pendientes') {
                seriesToShow = allSeries.filter(s => !viewedSeries.includes(s.id) && !s.genres?.includes('Skipped'));
                title = 'Miniseries pendientes';
            } else if (currentSection === 'vistas') {
                seriesToShow = allSeries.filter(s => viewedSeries.includes(s.id) || s.genres?.includes('Skipped'));
                title = 'Miniseries vistas';
            } else {
                seriesToShow = allSeries;
                title = 'Todas las miniseries';
            }

            if (seriesToShow.length === 0) {
                document.getElementById('content').innerHTML = `<div class="empty-msg">No hay series en esta sección</div>`;
                return;
            }

            let html = `<div class="category"><h2 class="category-title">${title} (${seriesToShow.length})</h2><div class="cards-grid">`;
            
            seriesToShow.forEach(series => {
                const isViewed = viewedSeries.includes(series.id);
                const poster = series.poster || 'https://via.placeholder.com/300x450/1a1a1a/666?text=' + encodeURIComponent(series.title);
                html += `
                    <div class="card" onclick="showDetail('${series.id}')">
                        ${isViewed ? '<div class="card-viewed">VISTA</div>' : ''}
                        <img class="card-poster" src="${poster}" alt="${series.title}" onerror="this.src='https://via.placeholder.com/300x450/1a1a1a/666?text=${encodeURIComponent(series.title)}'">
                        <div class="card-info">
                            <div class="card-title">${series.title}</div>
                            <div class="card-meta">${series.year} · ${series.episodes} eps</div>
                        </div>
                    </div>
                `;
            });
            
            html += '</div></div>';
            document.getElementById('content').innerHTML = html;
        }

        function showDetail(id) {
            const series = allSeries.find(s => s.id === id);
            if (!series) return;
            
            selectedSeries = series;
            const isViewed = viewedSeries.includes(series.id);
            
            document.getElementById('detailTitle').textContent = series.title;
            document.getElementById('detailMeta').textContent = `${series.year} · ${series.episodes} episodios · ${series.duration || ''}`;
            document.getElementById('detailSynopsis').textContent = series.synopsis || 'Sin sinopsis disponible.';
            
            const cast = series.cast || [];
            document.getElementById('detailCast').textContent = cast.length > 0 ? 'Reparto: ' + cast.join(', ') : '';
            
            const genres = series.genres || [];
            document.getElementById('detailGenres').innerHTML = genres.map(g => 
                `<span class="genre-tag">${g}</span>`
            ).join('');
            
            const poster = series.poster || 'https://via.placeholder.com/280x420/1a1a1a/666?text=' + encodeURIComponent(series.title);
            document.getElementById('detailPoster').src = poster;
            
            const btn = document.getElementById('markViewedBtn');
            if (isViewed) {
                btn.textContent = '✗ Desmarcar como vista';
                btn.classList.add('viewed');
            } else {
                btn.textContent = '✓ Marcar como vista';
                btn.classList.remove('viewed');
            }
            
            const netflixUrl = series.netflixUrl || '#';
            document.getElementById('netflixBtn').href = netflixUrl;
            document.getElementById('netflixBtn').style.display = netflixUrl !== '#' ? 'inline-block' : 'none';
            
            document.getElementById('detailPanel').classList.add('active');
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('active');
            selectedSeries = null;
        }

        function toggleViewed() {
            if (!selectedSeries) return;
            
            const id = selectedSeries.id;
            const idx = viewedSeries.indexOf(id);
            
            if (idx >= 0) {
                viewedSeries.splice(idx, 1);
            } else {
                viewedSeries.push(id);
            }
            
            localStorage.setItem('viewedSeries', JSON.stringify(viewedSeries));
            updateStats();
            renderContent();
            showDetail(id);
        }

        // Cerrar panel con Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeDetail();
        });

        // Iniciar
        loadSeries();
    </script>
</body>
</html>
