<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoNetflix - Miniseries</title>
    <style>
/* JoNetflix - Estilos principales */
/* Extraído de catalogo.html - 2026-05-08 */

* { margin: 0; padding: 0; box-sizing: border-box; }

body { 
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
    background-color: #141414; 
    color: #fff; 
    min-height: 100vh; 
}

/* === HEADER === */
.header { 
    position: fixed; 
    top: 0; 
    left: 0; 
    right: 0; 
    padding: 15px 30px; 
    background: linear-gradient(180deg, rgba(20,20,20,0.98) 0%, rgba(20,20,20,0) 100%); 
    z-index: 1000; 
    display: flex; 
    align-items: center; 
    gap: 20px; 
}

.logo { color: #e50914; font-size: 28px; font-weight: bold; letter-spacing: 2px; }
.logo .big { font-size: 36px; }

.nav-btn { 
    background: transparent; 
    border: none; 
    color: #fff; 
    font-size: 16px; 
    cursor: pointer; 
    padding: 8px 16px; 
    border-radius: 4px;
    transition: all 0.2s;
}
.nav-btn:hover { background: rgba(255,255,255,0.1); }
.nav-btn.active { border-bottom: 3px solid #e50914; }

.stats { 
    margin-left: auto; 
    background: rgba(255,255,255,0.1); 
    padding: 8px 16px; 
    border-radius: 4px; 
    font-size: 14px; 
    color: #aaa;
}
.stats span { color: #e50914; font-weight: bold; }

main { padding: 80px 30px 30px 30px; max-width: 1600px; margin: 0 auto; }

/* === DETAIL PANEL === */
.detail-panel { 
    position: fixed; 
    top: 70px; 
    left: 50%; 
    transform: translateX(-50%); 
    width: 90%; 
    max-width: 1200px; 
    background: #181818; 
    border-radius: 8px; 
    padding: 30px; 
    display: none; 
    z-index: 100; 
    box-shadow: 0 8px 32px rgba(0,0,0,0.9); 
    max-height: 85vh; 
    overflow-y: auto; 
}

.detail-panel.active { 
    display: flex; 
    gap: 30px; 
    animation: fadeIn 0.3s ease; 
}

@keyframes fadeIn { 
    from { opacity: 0; transform: translateX(-50%) translateY(-20px); } 
    to { opacity: 1; transform: translateX(-50%) translateY(0); } 
}

.detail-poster { 
    width: 280px; 
    height: 420px; 
    object-fit: cover; 
    border-radius: 8px; 
    flex-shrink: 0; 
    background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%); 
}

.detail-info { flex: 1; }
.detail-title { font-size: 36px; font-weight: bold; margin-bottom: 12px; }
.detail-meta { color: #999; margin-bottom: 20px; font-size: 15px; }
.detail-synopsis { line-height: 1.7; margin-bottom: 20px; font-size: 15px; }
.detail-cast { color: #aaa; font-size: 14px; margin-bottom: 20px; }
.detail-genres { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; }

.genre-tag { 
    background: rgba(229,9,14,0.2); 
    border: 1px solid rgba(229,9,14,0.5); 
    padding: 6px 14px; 
    border-radius: 4px; 
    font-size: 13px; 
}

.detail-actions { display: flex; gap: 15px; flex-wrap: wrap; }

.netflix-btn { 
    background: #e50914; 
    color: #fff; 
    border: none; 
    padding: 14px 28px; 
    font-size: 16px; 
    border-radius: 4px; 
    cursor: pointer; 
    transition: all 0.2s; 
    font-weight: bold; 
    text-decoration: none;
    display: inline-block;
}
.netflix-btn:hover { background: #f40612; transform: scale(1.02); }

.mark-viewed-btn {
    background: transparent;
    border: 2px solid #46d369;
    color: #46d369;
    padding: 12px 24px;
    font-size: 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: bold;
}
.mark-viewed-btn:hover { background: #46d369; color: #141414; }
.mark-viewed-btn.viewed { border-color: #666; color: #666; }
.mark-viewed-btn.viewed:hover { background: #333; color: #999; }

/* === CATEGORY === */
.category { margin-bottom: 50px; }
.category-title { 
    font-size: 26px; 
    margin-bottom: 20px; 
    padding-left: 15px; 
    border-left: 4px solid #e50914; 
}

.cards-grid { 
    display: grid; 
    grid-template-columns: repeat(5, 1fr); 
    gap: 20px; 
}

/* === CARD === */
.card { 
    cursor: pointer; 
    transition: all 0.3s ease; 
    border-radius: 8px; 
    overflow: hidden; 
    position: relative; 
    background: #1a1a1a;
}

.card:hover { 
    transform: scale(1.05); 
    box-shadow: 0 8px 25px rgba(0,0,0,0.5); 
}

.card img { 
    width: 100%; 
    height: 200px; 
    object-fit: cover; 
    display: block; 
}

.card-title { 
    padding: 12px; 
    font-size: 13px; 
    font-weight: 500; 
    white-space: nowrap; 
    overflow: hidden; 
    text-overflow: ellipsis; 
}

.card-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: #46d369;
    color: #141414;
    font-size: 10px;
    font-weight: bold;
    padding: 3px 8px;
    border-radius: 3px;
}

.card-badge.skipped { background: #666; color: #fff; }

.empty-msg {
    text-align: center;
    padding: 40px;
    color: #666;
    font-size: 18px;
}

.close-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    background: transparent;
    border: none;
    color: #fff;
    font-size: 28px;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
}
.close-btn:hover { opacity: 1; }

/* ============================================= */
/* MEDIA QUERIES - RESPONSIVE                    */
/* ============================================= */

/* === PC (>1024px) === */
@media (min-width: 1025px) {
    .cards-grid { grid-template-columns: repeat(5, 1fr); }
    .detail-panel { flex-direction: row; }
    .detail-poster { width: 280px; height: 420px; }
}

/* === Tablet (768-1024px) === */
@media (max-width: 1024px) and (min-width: 769px) {
    .cards-grid { grid-template-columns: repeat(4, 1fr); }
    .header { padding: 12px 20px; }
    main { padding: 70px 20px 20px 20px; }
    .detail-panel { 
        flex-direction: row; 
        padding: 20px;
    }
    .detail-poster { width: 220px; height: 330px; }
    .detail-title { font-size: 28px; }
}

/* === Móvil apaisado (landscape, 500-768px) === */
@media (max-width: 768px) and (min-width: 500px) and (orientation: landscape) {
    .cards-grid { grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .header { padding: 10px 15px; gap: 10px; }
    .logo { font-size: 22px; }
    .logo .big { font-size: 28px; }
    .nav-btn { font-size: 13px; padding: 6px 12px; }
    .stats { font-size: 12px; padding: 6px 10px; }
    main { padding: 60px 15px 15px 15px; }
    
    .card img { height: 120px; }
    .card-title { padding: 8px; font-size: 11px; }
    
    .detail-panel { 
        flex-direction: row; 
        padding: 15px;
        top: 60px;
        max-height: 80vh;
    }
    .detail-poster { width: 140px; height: 210px; }
    .detail-title { font-size: 20px; margin-bottom: 8px; }
    .detail-meta { font-size: 12px; margin-bottom: 12px; }
    .detail-synopsis { font-size: 12px; line-height: 1.5; }
    .genre-tag { padding: 4px 10px; font-size: 11px; }
    .netflix-btn { padding: 10px 20px; font-size: 13px; }
    .mark-viewed-btn { padding: 8px 16px; font-size: 12px; }
}

/* === Móvil vertical (portrait, <500px) === */
@media (max-width: 500px) and (orientation: portrait) {
    .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .header { padding: 10px 12px; gap: 8px; }
    .logo { font-size: 18px; }
    .logo .big { font-size: 24px; }
    .nav-btn { font-size: 12px; padding: 6px 10px; }
    .stats { font-size: 11px; padding: 5px 8px; }
    main { padding: 55px 10px 15px 10px; }
    
    .card img { height: 180px; }
    .card-title { padding: 8px; font-size: 11px; }
    
    .detail-panel { 
        flex-direction: column; 
        padding: 15px;
        top: 55px;
        width: 95%;
        max-height: 90vh;
    }
    .detail-poster { 
        width: 100%; 
        height: auto; 
        max-height: 250px;
        object-fit: contain;
    }
    .detail-title { font-size: 18px; margin-bottom: 8px; }
    .detail-meta { font-size: 12px; margin-bottom: 12px; }
    .detail-synopsis { font-size: 13px; line-height: 1.5; }
    .detail-genres { margin-bottom: 15px; }
    .genre-tag { padding: 4px 10px; font-size: 11px; }
    .detail-actions { flex-direction: column; }
    .netflix-btn { 
        width: 100%; 
        text-align: center; 
        padding: 12px 20px; 
    }
    .mark-viewed-btn { width: 100%; }
    
    .category-title { font-size: 18px; }
    .category { margin-bottom: 30px; }
}

/* === Móvil pequeño vertical (<360px) === */
@media (max-width: 360px) and (orientation: portrait) {
    .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .card img { height: 150px; }
    .card-title { padding: 6px; font-size: 10px; }
}
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"><span class="big">J</span>o<span class="big">N</span>etflix</div>
        <button class="nav-btn active" id="btnPendientes" onclick="showSection('pendientes')">📺 Pendientes</button>
        <button class="nav-btn" id="btnVistas" onclick="showSection('vistas')">✅ Vistas</button>
        <button class="nav-btn" id="btnTodas" onclick="showSection('todas')">📋 Todas</button>
        <div class="stats" id="stats"></div>
    </header>

    <main>
        <div class="detail-panel" id="detailPanel">
            <button class="close-btn" onclick="closeDetail()">×</button>
            <img class="detail-poster" id="detailPoster" src="" alt="">
            <div class="detail-info">
                <h1 class="detail-title" id="detailTitle"></h1>
                <div class="detail-meta" id="detailMeta"></div>
                <p class="detail-synopsis" id="detailSynopsis"></p>
                <div class="detail-cast" id="detailCast"></div>
                <div class="detail-genres" id="detailGenres"></div>
                <div class="detail-actions">
                    <a class="netflix-btn" id="netflixBtn" href="#" target="_blank">▶ Ver en Netflix</a>
                    <button class="mark-viewed-btn" id="markViewedBtn" onclick="toggleViewed()">✓ Marcar como vista</button>
                </div>
            </div>
        </div>
        <div id="content"><div class="loading">Cargando catálogo...</div></div>
    </main>

    <script>
    let allSeries = [];
    let currentSection = 'pendientes';
    let selectedSeries = null;
    let viewedSeries = JSON.parse(localStorage.getItem('viewedSeries') || '[]');

    const CATEGORY_ORDER = [
        'Thriller', 'Drama', 'True Crime', 'Documental', 
        'Romance', 'Histórico', 'Nórdico', 'Judicial', 
        'Biográfico', 'Acción', 'Fantasía', 'Comedia', 'Otros'
    ];

    async function loadSeries() {
        try {
            const response = await fetch('data.json');
            const data = await response.json();
            allSeries = data.series;
            console.log('Cargadas', allSeries.length, 'series');
        } catch (e) {
            console.error('Error cargando datos:', e);
            document.getElementById('content').innerHTML = '<div class="empty-msg">Error al cargar el catálogo</div>';
            return;
        }
        
        allSeries.forEach(s => {
            if (s.viewed && !viewedSeries.includes(s.id)) {
                viewedSeries.push(s.id);
            }
        });
        localStorage.setItem('viewedSeries', JSON.stringify(viewedSeries));
        updateStats();
        renderContent();
    }

    function updateStats() {
        const notViewed = allSeries.filter(s => !viewedSeries.includes(s.id) && !s.genres?.includes('Skipped')).length;
        const viewed = allSeries.filter(s => viewedSeries.includes(s.id)).length;
        document.getElementById('stats').innerHTML = 
            `📊 <span>${notViewed}</span> pendientes · <span>${viewed}</span> vistas`;
    }

    function showSection(section) {
        currentSection = section;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn' + section.charAt(0).toUpperCase() + section.slice(1)).classList.add('active');
        closeDetail();
        renderContent();
    }

    function getMainGenre(genres) {
        if (!genres || genres.length === 0) return 'Otros';
        const realGenres = genres.filter(g => g !== 'Skipped');
        return realGenres[0] || 'Otros';
    }

    function groupByCategory(series) {
        const categories = {};
        series.forEach(s => {
            const genre = getMainGenre(s.genres);
            if (!categories[genre]) categories[genre] = [];
            categories[genre].push(s);
        });
        return categories;
    }

    function renderContent() {
        let seriesToShow = [];
        
        if (currentSection === 'pendientes') {
            seriesToShow = allSeries.filter(s => !viewedSeries.includes(s.id) && !s.genres?.includes('Skipped'));
        } else if (currentSection === 'vistas') {
            seriesToShow = allSeries.filter(s => viewedSeries.includes(s.id) || s.genres?.includes('Skipped'));
        } else {
            seriesToShow = allSeries;
        }

        if (seriesToShow.length === 0) {
            document.getElementById('content').innerHTML = `<div class="empty-msg">No hay series en esta sección</div>`;
            return;
        }

        const categories = groupByCategory(seriesToShow);
        let html = '';
        
        CATEGORY_ORDER.forEach(cat => {
            if (categories[cat] && categories[cat].length > 0) {
                html += renderCategory(cat, categories[cat]);
            }
        });
        
        Object.keys(categories).forEach(cat => {
            if (!CATEGORY_ORDER.includes(cat) && categories[cat].length > 0) {
                html += renderCategory(cat, categories[cat]);
            }
        });

        document.getElementById('content').innerHTML = html;
    }

    function renderCategory(name, series) {
        let html = `<div class="category"><h2 class="category-title">${name} (${series.length})</h2><div class="cards-grid">`;
        
        series.forEach(s => {
            const isViewed = viewedSeries.includes(s.id);
            const isSkipped = s.genres?.includes('Skipped');
            const poster = s.poster || 'https://via.placeholder.com/300x450/1a1a1a/666?text=' + encodeURIComponent(s.title);
            
            html += `
                <div class="card" onclick="showDetail('${s.id}')">
                    ${isViewed && !isSkipped ? '<span class="card-badge">✓</span>' : ''}
                    ${isSkipped ? '<span class="card-badge skipped">SKIP</span>' : ''}
                    <img src="${poster}" alt="${s.title}" onerror="this.src='https://via.placeholder.com/300x450/1a1a1a/666?text=${encodeURIComponent(s.title)}'">
                    <div class="card-title">${s.title}</div>
                </div>
            `;
        });
        
        html += '</div></div>';
        return html;
    }

    function showDetail(id) {
        const series = allSeries.find(s => s.id === id);
        if (!series) return;
        
        selectedSeries = series;
        const isViewed = viewedSeries.includes(series.id);
        
        document.getElementById('detailTitle').textContent = series.title;
        document.getElementById('detailMeta').textContent = `${series.year} · ${series.episodes} episodios · ${series.duration || ''}`;
        document.getElementById('detailSynopsis').textContent = series.synopsis || 'Sin sinopsis disponible.';
        
        const cast = series.cast || [];
        document.getElementById('detailCast').textContent = cast.length > 0 ? 'Reparto: ' + cast.join(', ') : '';
        
        const genres = series.genres || [];
        document.getElementById('detailGenres').innerHTML = genres.map(g => 
            `<span class="genre-tag">${g}</span>`
        ).join('');
        
        const poster = series.poster || 'https://via.placeholder.com/280x420/1a1a1a/666?text=' + encodeURIComponent(series.title);
        document.getElementById('detailPoster').src = poster;
        
        const btn = document.getElementById('markViewedBtn');
        if (isViewed) {
            btn.textContent = '✗ Desmarcar como vista';
            btn.classList.add('viewed');
        } else {
            btn.textContent = '✓ Marcar como vista';
            btn.classList.remove('viewed');
        }
        
        const netflixUrl = series.netflixUrl || '#';
        document.getElementById('netflixBtn').href = netflixUrl;
        document.getElementById('netflixBtn').style.display = netflixUrl !== '#' ? 'inline-block' : 'none';
        
        document.getElementById('detailPanel').classList.add('active');
    }

    function closeDetail() {
        document.getElementById('detailPanel').classList.remove('active');
        selectedSeries = null;
    }

    function toggleViewed() {
        if (!selectedSeries) return;
        
        const id = selectedSeries.id;
        const idx = viewedSeries.indexOf(id);
        
        if (idx >= 0) {
            viewedSeries.splice(idx, 1);
        } else {
            viewedSeries.push(id);
        }
        
        localStorage.setItem('viewedSeries', JSON.stringify(viewedSeries));
        updateStats();
        renderContent();
        showDetail(id);
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeDetail();
    });

    loadSeries();
    </script>
</body>
</html>
